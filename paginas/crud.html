<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decalz - CRUD de Projetos</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/crud.css">
</head>
<body>
    <nav>
        <a href="../decalz.html#topo" class="nav-logo">DECALZ<span></span></a>
        <ul class="nav-links">
            <li><a href="../decalz.html#colecoes">Coleções</a></li>
            <li><a href="../decalz.html#categorias">Categorias</a></li>
            <li><a href="../decalz.html#personalizado">Personalizado</a></li>
            <li><a href="../decalz.html#sobre">Sobre</a></li>
            <li><a href="#lista-projetos" class="nav-cta">Ver Catálogo</a></li>
        </ul>
    </nav>

    <main>
        <section id="crud" class="crud-section">
            <div class="section-head">
                <span class="section-tag">Painel interno</span>
                <h1 class="section-title">Cadastro de Decalques</h1>
                <p class="section-subtitle">Gerencie os itens de ListaDeProjetos e atualize o catalogo em tempo real.</p>
            </div>

            <div class="crud-panel">
                <div class="field-group">
                    <label for="nome">Nome do decalque</label>
                    <input id="nome" type="text" placeholder="Ex: Panzer Elite" />
                </div>

                <div class="field-group">
                    <label for="tipo">Tipo</label>
                    <input id="tipo" type="text" placeholder="Ex: Blindados WW2" />
                </div>

                <div class="field-group field-full">
                    <label for="link">Link da imagem</label>
                    <input id="link" type="url" placeholder="https://..." />
                </div>

                <button type="button" class="btn-primary" onclick="adicionar()">Salvar item</button>
            </div>
        </section>

        <section id="lista-projetos" class="list-section">
            <div class="section-head">
                <span class="section-tag">Catalogo</span>
                <h2 class="section-title">Itens cadastrados</h2>
            </div>
            <ul id="lista" class="project-list"></ul>
        </section>
    </main>

    <script src="../assets/js/crud.js"></script>
</body>
</html>
